<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Word Dictionary</title>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
            rel="stylesheet">

        <link rel="stylesheet" href="style.css" />
    </head>

    <body>
        <header class="header">
            <h1> Wordly Dictionary</h1>
            <p>Search for any English word and learn its meaning immediately.</p>
        </header>

        <!-- Search Form -->
        <form id="search-form" class="search-form" aria-label="Dictionary search form">

            <input type="text" id="word-input" placeholder="Enter a word..." aria-label="Enter a word to search"
                autocomplete="off" required />

            <button type="submit" aria-label="Search for word">
                Search
            </button>

        </form>
    </body>

</html>
